name: CI/CD FastAPI

on:
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          TESTING: "True"
        run: |
          python -m pytest || exit 1


  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Deploy to GCP VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_SERVICE_SID: ${{ secrets.TWILIO_SERVICE_SID }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          ADMIN_API_KEY_HASH: ${{ secrets.ADMIN_API_KEY_HASH }}
          IMSI_USERNAME: ${{ secrets.IMSI_USERNAME }}
          IMSI_PASSWORD: ${{ secrets.IMSI_PASSWORD }}
          EPAY_CLIENT_ID: ${{ secrets.EPAY_CLIENT_ID }}
          EPAY_CLIENT_SECRET: ${{ secrets.EPAY_CLIENT_SECRET }}
          EPAY_TERMINAL_ID: ${{ secrets.EPAY_TERMINAL_ID }}
          EPAY_OAUTH_URL: ${{ secrets.EPAY_OAUTH_URL }}
          EPAY_API_URL: ${{ secrets.EPAY_API_URL }}
          EPAY_OAUTH_FALLBACK_URL: ${{ secrets.EPAY_OAUTH_FALLBACK_URL }}
          EPAY_API_FALLBACK_URL: ${{ secrets.EPAY_API_FALLBACK_URL }}
          EPAY_PAYMENT_PAGE_JS: ${{ secrets.EPAY_PAYMENT_PAGE_JS }}
          EPAY_POSTLINK_BASE_URL: ${{ secrets.EPAY_POSTLINK_BASE_URL }}
          EPAY_CHECKOUT_BASE_URL: ${{ secrets.EPAY_CHECKOUT_BASE_URL }}
          EPAY_DEFAULT_BACK_LINK: ${{ secrets.EPAY_DEFAULT_BACK_LINK }}
          EPAY_DEFAULT_FAILURE_BACK_LINK: ${{ secrets.EPAY_DEFAULT_FAILURE_BACK_LINK }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN,TWILIO_SERVICE_SID,SECRET_KEY,ADMIN_API_KEY,ADMIN_API_KEY_HASH,IMSI_USERNAME,IMSI_PASSWORD,EPAY_CLIENT_ID,EPAY_CLIENT_SECRET,EPAY_TERMINAL_ID,EPAY_OAUTH_URL,EPAY_API_URL,EPAY_OAUTH_FALLBACK_URL,EPAY_API_FALLBACK_URL,EPAY_PAYMENT_PAGE_JS,EPAY_POSTLINK_BASE_URL,EPAY_CHECKOUT_BASE_URL,EPAY_DEFAULT_BACK_LINK,EPAY_DEFAULT_FAILURE_BACK_LINK
          script: |
            set -e
            cd /var/www/vink-server
            git fetch origin main
            git reset --hard origin/main
            
            # Create .env from secrets passed via env
            cat <<EOF > .env
            PROJECT_NAME="Vink Backend"
            SECRET_KEY="$SECRET_KEY"
            ALGORITHM="HS256"
            ACCESS_TOKEN_EXPIRE_MINUTES=11520
            ADMIN_API_KEY="$ADMIN_API_KEY"
            ADMIN_API_KEY_HASH="$ADMIN_API_KEY_HASH"
            FIREBASE_CREDENTIALS_PATH="vink-testik.json"
            IMSI_API_URL="https://mit.imsipay.com/b2b"
            IMSI_USERNAME="$IMSI_USERNAME"
            IMSI_PASSWORD="$IMSI_PASSWORD"
            MOCK_OTP_CODE="123456"
            ENVIRONMENT="production"
            TWILIO_ACCOUNT_SID="$TWILIO_ACCOUNT_SID"
            TWILIO_AUTH_TOKEN="$TWILIO_AUTH_TOKEN"
            TWILIO_SERVICE_SID="$TWILIO_SERVICE_SID"
            
            # EPay Configuration
            EPAY_OAUTH_URL="$EPAY_OAUTH_URL"
            EPAY_API_URL="$EPAY_API_URL"
            EPAY_OAUTH_FALLBACK_URL="$EPAY_OAUTH_FALLBACK_URL"
            EPAY_API_FALLBACK_URL="$EPAY_API_FALLBACK_URL"
            EPAY_PAYMENT_PAGE_JS="$EPAY_PAYMENT_PAGE_JS"
            EPAY_CLIENT_ID="$EPAY_CLIENT_ID"
            EPAY_CLIENT_SECRET="$EPAY_CLIENT_SECRET"
            EPAY_TERMINAL_ID="$EPAY_TERMINAL_ID"
            EPAY_POSTLINK_BASE_URL="$EPAY_POSTLINK_BASE_URL"
            EPAY_CHECKOUT_BASE_URL="$EPAY_CHECKOUT_BASE_URL"
            EPAY_DEFAULT_BACK_LINK="$EPAY_DEFAULT_BACK_LINK"
            EPAY_DEFAULT_FAILURE_BACK_LINK="$EPAY_DEFAULT_FAILURE_BACK_LINK"
            
            # EPay Logic Settings
            EPAY_ESIM_AUTOPAY_ENABLED=true
            EPAY_ESIM_AUTOPAY_THRESHOLD_MB=51
            EPAY_ESIM_AUTOPAY_PACKAGE_MB=3072
            EPAY_ESIM_AUTOPAY_COOLDOWN_MINUTES=60
            EPAY_HTTP_TIMEOUT_SECONDS=10
            EPAY_HTTP_RETRIES=2
            EPAY_REQUEST_DEADLINE_SECONDS=25
            EOF
            
            # Using up -d --build to rebuild images and restart containers minimal downtime
            docker compose up -d --build
            # Clean up unused images to save disk space
            docker image prune -f
